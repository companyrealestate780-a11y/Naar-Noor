# Production compose file
# Naming Convention: naar-noor-{environment}-{service}
# Services: web (frontend), api (backend), database

services:
  # Frontend - Angular SPA served by Nginx
  naar-noor-prod-web:
    build:
      context: ./naar-noor
      dockerfile: Dockerfile
    container_name: naar-noor-prod-web
    hostname: naar-noor-prod-web
    image: naar-noor:frontend
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
      - API_URL=http://naar-noor-prod-api:80/api
    depends_on:
      naar-noor-prod-api:
        condition: service_healthy
    networks:
      - naar-noor-prod-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    labels:
      com.naar-noor.service: "web"
      com.naar-noor.environment: "production"
      com.naar-noor.description: "Frontend web server (Nginx + Angular)"

  # Backend - ASP.NET Core API
  naar-noor-prod-api:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    container_name: naar-noor-prod-api
    hostname: naar-noor-prod-api
    image: naar-noor:backend
    ports:
      - "8080:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - POSTGRESQL_CONNECTION_STRING=Host=db.uyzocpvytoljigmcpafn.supabase.co;Port=5432;Database=postgres;User Id=postgres;Password=${SUPABASE_DB_PASSWORD}
      - Supabase__Url=${SUPABASE_URL}
      - Supabase__AnonKey=${SUPABASE_ANON_KEY}
      - Supabase__ServiceRoleKey=${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      - naar-noor-prod-web
    networks:
      - naar-noor-prod-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      com.naar-noor.service: "api"
      com.naar-noor.environment: "production"
      com.naar-noor.description: "Backend API server (.NET 8.0)"

  # Note: Database is managed by Supabase (PostgreSQL)
  # Connection string should be set via environment variables:
  # - POSTGRESQL_CONNECTION_STRING or
  # - ConnectionStrings__SupabasePostgresql in appsettings
  # 
  # For local development with PostgreSQL, use:
  # docker run -d --name naar-noor-local-db \
  #   -e POSTGRES_PASSWORD=dev123 \
  #   -e POSTGRES_DB=naar_noor \
  #   -p 5432:5432 \
  #   postgres:16-alpine

networks:
  naar-noor-prod-network:
    name: naar-noor-prod-network
    driver: bridge
    labels:
      com.naar-noor.network: "production"
